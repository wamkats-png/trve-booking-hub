name: Test & Auto-merge to main

on:
  push:
    branches:
      - claude/confirm-working-4yYw8
      - claude/review-reference-docs-j0bPB

jobs:
  test-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn[standard] python-multipart httpx pytest pytest-asyncio

      - name: Run tests
        run: |
          pytest tests/test_api.py -q --tb=short

      - name: Merge to main
        run: |
          git config user.email "ci-auto@trve.local"
          git config user.name "TRVE Auto-Merge"
          git checkout main
          git pull origin main
          git merge --no-ff ${{ github.ref_name }} \
            -m "ci: auto-merge ${{ github.ref_name }} → main [skip ci]"
          git push origin main

      - name: Sync master to main
        run: |
          git checkout master
          git reset --hard main
          git push origin master --force
