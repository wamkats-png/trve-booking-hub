<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Your Safari Itinerary — TRVE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #0D5E4F; --green-dark: #094a3e; --green-light: #e8f4f1;
      --gold: #C8963E; --gold-dark: #a97830; --gold-light: #fdf3e3;
      --text: #1a2e2a; --text-muted: #6b8070; --text-light: #9ab0a8;
      --bg: #f5f7f6; --surface: #ffffff; --border: #dde8e4;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(13,94,79,.10);
      --shadow-lg: 0 8px 32px rgba(13,94,79,.14);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }

    /* Header */
    .site-header { background: var(--green); color: #fff; padding: 16px 20px;
                   position: sticky; top: 0; z-index: 50; }
    .site-header-inner { max-width: 720px; margin: 0 auto;
                         display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo { width: 32px; height: 32px; background: var(--gold);
                  border-radius: 8px; display: flex; align-items: center; justify-content: center;
                  font-weight: 800; font-size: 13px; color: #fff; flex-shrink: 0; }
    .brand-name { font-size: 15px; font-weight: 700; letter-spacing: .02em; }
    .brand-sub  { font-size: 11px; opacity: .75; }
    .header-trip-title { font-size: 13px; opacity: .85; text-align: right; max-width: 200px;
                         overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Layout */
    .page { max-width: 720px; margin: 0 auto; padding: 20px 16px 48px; }

    /* Loading / error */
    .state-card { background: var(--surface); border-radius: var(--radius); padding: 40px 24px;
                  text-align: center; box-shadow: var(--shadow); }
    .state-card h2 { font-size: 18px; color: var(--green); margin-bottom: 8px; }
    .state-card p  { color: var(--text-muted); font-size: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--green-light);
               border-top-color: var(--green); border-radius: 50%;
               animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Summary card */
    .summary-card { background: var(--green); color: #fff; border-radius: var(--radius);
                    padding: 24px 20px; margin-bottom: 20px; box-shadow: var(--shadow-lg); }
    .summary-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .summary-subtitle { font-size: 13px; opacity: .8; margin-bottom: 20px; }
    .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (min-width: 480px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
    .summary-stat { background: rgba(255,255,255,.12); border-radius: var(--radius-sm);
                    padding: 12px; text-align: center; }
    .summary-stat-value { font-size: 18px; font-weight: 700; }
    .summary-stat-label { font-size: 10px; opacity: .75; text-transform: uppercase;
                          letter-spacing: .06em; margin-top: 2px; }

    /* Section header */
    .section-title { font-size: 13px; font-weight: 700; color: var(--text-muted);
                     text-transform: uppercase; letter-spacing: .07em;
                     margin: 28px 0 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Timeline */
    .timeline { position: relative; padding-left: 32px; }
    .timeline::before { content: ''; position: absolute; left: 11px; top: 8px;
                        bottom: 8px; width: 2px; background: var(--border); }
    .tl-item { position: relative; margin-bottom: 16px; }
    .tl-dot { position: absolute; left: -32px; top: 6px; width: 22px; height: 22px;
              background: var(--green); border-radius: 50%; display: flex;
              align-items: center; justify-content: center; flex-shrink: 0; }
    .tl-dot svg { width: 11px; height: 11px; color: #fff; }
    .tl-dot.gold { background: var(--gold); }
    .tl-card { background: var(--surface); border-radius: var(--radius-sm);
               border: 1px solid var(--border); padding: 14px 16px;
               box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .tl-day   { font-size: 10px; font-weight: 700; color: var(--gold-dark);
                text-transform: uppercase; letter-spacing: .08em; margin-bottom: 2px; }
    .tl-lodge { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
    .tl-dest  { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .tl-activities { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tl-act   { display: flex; align-items: center; gap: 5px; background: var(--green-light);
                color: var(--green); font-size: 11px; font-weight: 600;
                padding: 3px 8px; border-radius: 20px; }
    .tl-act svg { width: 10px; height: 10px; flex-shrink: 0; }

    /* Map section */
    .map-wrap { background: var(--surface); border-radius: var(--radius);
                overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
    .map-wrap iframe { width: 100%; height: 280px; border: none; display: block; }
    .map-placeholder { height: 200px; display: flex; flex-direction: column;
                       align-items: center; justify-content: center;
                       color: var(--text-muted); gap: 8px; }
    .map-placeholder svg { width: 36px; height: 36px; opacity: .4; }

    /* Contact section */
    .contact-card { background: var(--gold-light); border: 1px solid #f0d9a8;
                    border-radius: var(--radius); padding: 20px; text-align: center; }
    .contact-card h3 { font-size: 16px; color: var(--gold-dark); margin-bottom: 6px; }
    .contact-card p  { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
    .contact-btns    { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-wa  { display: inline-flex; align-items: center; gap: 8px;
               background: #25d366; color: #fff; text-decoration: none;
               font-size: 14px; font-weight: 600; padding: 13px 20px;
               border-radius: 8px; transition: opacity .15s; }
    .btn-wa:hover { opacity: .88; }
    .btn-email { display: inline-flex; align-items: center; gap: 8px;
                 background: var(--green); color: #fff; text-decoration: none;
                 font-size: 14px; font-weight: 600; padding: 13px 20px;
                 border-radius: 8px; transition: opacity .15s; }
    .btn-email:hover { opacity: .88; }

    /* Footer */
    .page-footer { text-align: center; padding: 24px 16px;
                   font-size: 11px; color: var(--text-light); }

    /* Mobile polish */
    body { padding-bottom: env(safe-area-inset-bottom, 0px); }
    @media (max-width: 480px) {
      .map-wrap iframe { height: 200px; }
    }
    @media (max-width: 360px) {
      .timeline  { padding-left: 24px; }
      .tl-dot    { left: -24px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="brand">
      <div class="brand-logo">T</div>
      <div>
        <div class="brand-name">TRVE</div>
        <div class="brand-sub">The Rift Valley Explorer</div>
      </div>
    </div>
    <div class="header-trip-title" id="headerTripTitle">Your Safari</div>
  </div>
</header>

<main class="page" id="mainContent">
  <div class="state-card" id="loadingState">
    <div class="spinner"></div>
    <h2>Loading your itinerary&hellip;</h2>
    <p>Just a moment</p>
  </div>
</main>

<footer class="page-footer">
  &copy; TRVE &mdash; The Rift Valley Explorer &bull; trve.co.ug
</footer>

<script>
  const token = location.pathname.split('/').filter(Boolean).pop();

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
    catch { return d; }
  }

  const ACTIVITY_ICONS = {
    gorilla: `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="6" cy="4" r="2.5"/><path d="M2 10c0-2.2 1.8-4 4-4s4 1.8 4 4"/></svg>`,
    chimp:   `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="6" cy="4" r="2.5"/><path d="M2 10c0-2.2 1.8-4 4-4s4 1.8 4 4"/></svg>`,
    drive:   `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="4" width="10" height="5" rx="1.5"/><circle cx="3.5" cy="9" r="1"/><circle cx="8.5" cy="9" r="1"/><path d="M3 4l1.5-2.5h3L9 4"/></svg>`,
    boat:    `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 7h8l-1 3H3L2 7z"/><path d="M6 2v5M4 4h4"/></svg>`,
    hike:    `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="6" cy="2.5" r="1.5"/><path d="M6 4v4M4 6l2 1 2-1M4 10l2-2 2 2"/></svg>`,
    bird:    `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 6c2-4 6-4 8 0M5 6c0 2 1 3 1 3s1-1 1-3"/></svg>`,
    default: `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="6" cy="6" r="4.5"/><path d="M6 4v2.5l1.5 1.5"/></svg>`,
  };

  function activityIcon(name) {
    const n = (name || '').toLowerCase();
    if (n.includes('gorilla')) return ACTIVITY_ICONS.gorilla;
    if (n.includes('chimp'))   return ACTIVITY_ICONS.chimp;
    if (n.includes('drive') || n.includes('game')) return ACTIVITY_ICONS.drive;
    if (n.includes('boat') || n.includes('cruise')) return ACTIVITY_ICONS.boat;
    if (n.includes('hike') || n.includes('trek') || n.includes('walk')) return ACTIVITY_ICONS.hike;
    if (n.includes('bird'))   return ACTIVITY_ICONS.bird;
    return ACTIVITY_ICONS.default;
  }

  function buildTripTitle(data) {
    const dests = (data.destinations || []).filter(Boolean);
    if (dests.length) return dests.join(' · ');
    if (data.tour_type) return data.tour_type;
    return 'Safari Itinerary';
  }

  function parseTimelineDays(data) {
    const days = [];
    const raw = data.working_itinerary || '';
    if (!raw.trim()) return days;

    // Try to parse Day X: / Day X — patterns
    const blocks = raw.split(/(?=\bDay\s+\d+\b)/i);
    blocks.forEach((block, i) => {
      const match = block.match(/^Day\s+(\d+)\b[:\s\-–—]*(.*?)(?:\n|$)/i);
      if (!match) return;
      const dayNum = parseInt(match[1]);
      const firstLine = match[2].trim();
      const body = block.slice(match[0].length).trim();
      // Extract activities from body lines
      const activities = [];
      body.split('\n').forEach(line => {
        const l = line.trim().replace(/^[-•*]\s*/, '');
        if (l.length > 3 && l.length < 100) activities.push(l);
      });
      days.push({ day: dayNum, title: firstLine, activities: activities.slice(0, 5) });
    });

    // If no Day blocks found, return empty (we'll show raw text)
    return days;
  }

  function buildDestinationsMap(destinations) {
    // Use a simple Google Maps embed with destinations as query
    if (!destinations || !destinations.length) return null;
    const q = encodeURIComponent(destinations.join(', ') + ', Uganda');
    return `https://www.google.com/maps?q=${q}&output=embed`;
  }

  function renderItinerary(data) {
    const title = buildTripTitle(data);
    document.getElementById('headerTripTitle').textContent = title;
    document.title = `${title} — TRVE`;

    const dests = (data.destinations || []).filter(Boolean);
    const nights = data.duration_days ? data.duration_days - 1 : '—';
    const pax = data.pax || '—';
    const startFmt = fmt(data.travel_start_date);
    const endFmt   = fmt(data.travel_end_date);
    const dateRange = (data.travel_start_date || data.travel_end_date)
      ? `${startFmt} – ${endFmt}` : '—';

    // --- Summary card ---
    let html = `
      <div class="summary-card">
        <div class="summary-title">${esc(title)}</div>
        <div class="summary-subtitle">${esc(dateRange)}</div>
        <div class="summary-grid">
          <div class="summary-stat">
            <div class="summary-stat-value">${esc(String(data.duration_days || '—'))}</div>
            <div class="summary-stat-label">Days</div>
          </div>
          <div class="summary-stat">
            <div class="summary-stat-value">${esc(String(nights))}</div>
            <div class="summary-stat-label">Nights</div>
          </div>
          <div class="summary-stat">
            <div class="summary-stat-value">${esc(String(pax))}</div>
            <div class="summary-stat-label">Travellers</div>
          </div>
          <div class="summary-stat">
            <div class="summary-stat-value">${dests.length || '—'}</div>
            <div class="summary-stat-label">Destinations</div>
          </div>
        </div>
        ${dests.length ? `<div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:6px">
          ${dests.map(d=>`<span style="background:rgba(255,255,255,.18);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600">${esc(d)}</span>`).join('')}
        </div>` : ''}
      </div>
    `;

    // --- Day-by-day timeline ---
    const days = parseTimelineDays(data);
    if (days.length > 0) {
      html += `<div class="section-title">Day-by-Day</div>
        <div class="timeline">`;
      days.forEach(d => {
        html += `
          <div class="tl-item">
            <div class="tl-dot${d.day === 1 ? ' gold' : ''}">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M6 1.5v2M6 8.5v2M1.5 6h2M8.5 6h2" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="tl-card">
              <div class="tl-day">Day ${d.day}</div>
              ${d.title ? `<div class="tl-lodge">${esc(d.title)}</div>` : ''}
              ${d.activities.length ? `
                <div class="tl-activities">
                  ${d.activities.map(a=>`<span class="tl-act">${activityIcon(a)}${esc(a)}</span>`).join('')}
                </div>` : ''}
            </div>
          </div>`;
      });
      html += `</div>`;
    } else if (data.working_itinerary) {
      // Fallback: show raw itinerary text
      html += `<div class="section-title">Itinerary</div>
        <div style="background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:16px;white-space:pre-wrap;font-size:13px;line-height:1.7;color:var(--text)">${esc(data.working_itinerary)}</div>`;
    }

    // --- Map ---
    const mapSrc = buildDestinationsMap(dests);
    html += `<div class="section-title">Map</div>
      <div class="map-wrap">`;
    if (mapSrc) {
      html += `<iframe src="${esc(mapSrc)}" allowfullscreen loading="lazy"
                 title="Destinations map"></iframe>`;
    } else {
      html += `<div class="map-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        <span style="font-size:13px">Map unavailable for this itinerary</span>
      </div>`;
    }
    html += `</div>`;

    // --- Special requests / notes ---
    if (data.special_requests) {
      html += `<div class="section-title">Notes &amp; Special Requests</div>
        <div style="background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px 16px;font-size:13px;color:var(--text-muted);white-space:pre-wrap">${esc(data.special_requests)}</div>`;
    }

    // --- Contact ---
    const ref = esc(data.booking_ref || '');
    const waMsg = encodeURIComponent(`Hi TRVE, I'm looking at my itinerary (ref: ${data.booking_ref}). `);
    const emailSubj = encodeURIComponent(`Safari Enquiry — ${data.booking_ref}`);
    html += `
      <div class="section-title">Get in Touch</div>
      <div class="contact-card">
        <h3>Questions about your safari?</h3>
        <p>Your TRVE coordinator is ready to help. Reference: <strong>${ref}</strong></p>
        <div class="contact-btns">
          <a class="btn-wa"
             href="https://wa.me/256XXXXXXXXX?text=${waMsg}"
             target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            WhatsApp
          </a>
          <a class="btn-email"
             href="mailto:safaris@trve.co.ug?subject=${emailSubj}"
             target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Email
          </a>
        </div>
      </div>`;

    document.getElementById('mainContent').innerHTML = html;
  }

  function renderError(msg) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-card">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="margin:0 auto 16px">
          <circle cx="20" cy="20" r="18" stroke="#C8963E" stroke-width="2"/>
          <path d="M20 12v10M20 27v1" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <h2>Itinerary unavailable</h2>
        <p>${esc(msg)}</p>
      </div>`;
  }

  async function load() {
    try {
      const res = await fetch(`/api/share/${token}`);
      if (res.status === 404) { renderError('This itinerary link is invalid or has expired.'); return; }
      if (!res.ok) { renderError('Unable to load itinerary. Please try again.'); return; }
      const { itinerary_data } = await res.json();
      renderItinerary(itinerary_data);
    } catch (e) {
      renderError('Connection error. Please check your internet and try again.');
    }
  }

  load();
</script>
</body>
</html>
